  storage_pb_years:      7
  free_storage_pb_years: 3.2
  cpu_mhrs:              21
  free_cpu_mhrs:         20.4
  gpu_mhrs:              20
  free_gpu_mhrs:         0.8
  hosted_data_pb_years:  3.25
  expected_local_users:  8

